<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <title>{{TITLE}}</title>

  <!-- Outfit, the brand typeface. See knowledge-base/marketing/brand/brand-guidelines.md §04. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" />

  <style>{{INLINE_CSS}}</style>
  <style>
    /* Hide the inactive section based on the render mode. The same template
       renders the cover and the body — generate.js calls puppeteer twice and
       merges the resulting PDFs. */
    body.ww-mode-cover .body { display: none; }
    body.ww-mode-body .cover { display: none; }
  </style>
</head>
<body class="{{BODY_CLASS}}">

  <section class="cover">
    <header class="cover-header">
      <img class="cover-logo" src="{{LOGO_LOCKUP}}" alt="Worksop Workspace" />
      <div class="cover-header-meta">
        <div class="eyebrow">{{EYEBROW}}</div>
        <div class="ref">Ref. {{REF}}</div>
      </div>
    </header>

    <div class="cover-body">
      <h1 class="title">{{TITLE}}</h1>
      <div class="title-rule"></div>
      {{SUBTITLE_BLOCK}}

      <dl class="cover-facts">
        <div class="fact">
          <dt>Status</dt>
          <dd><span class="status-pill {{STATUS_CLASS}}">{{STATUS}}</span></dd>
        </div>
        <div class="fact">
          <dt>Last updated</dt>
          <dd>{{LAST_UPDATED}}</dd>
        </div>
        <div class="fact">
          <dt>Document</dt>
          <dd>{{REF}}</dd>
        </div>
        <div class="fact">
          <dt>Audience</dt>
          <dd>Internal — staff use only</dd>
        </div>
      </dl>
    </div>

    <footer class="cover-footer">
      <div class="cover-tag">A space to drop your shoulders.</div>
      <div class="cover-address">
        30 Carlton Road, Worksop S80 1PH<br />
        hello@worksopworkspace.co.uk · worksopworkspace.com
      </div>
    </footer>
  </section>

  <main class="body">
    {{BODY_HTML}}
  </main>

</body>
</html>
